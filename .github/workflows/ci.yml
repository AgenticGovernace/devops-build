#file: noinspection YAMLSchemaValidation
on:
  push:
    branches: [ main
                - dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [ 20.x ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm run install:ci

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm test -- --run

      - name: Run build
        run: npm run build
  upload-qodana-config: { needs:  , outputs:  , container:  , services:  , env:  , steps: [      ], continue-on-error:  , concurrency:  , environment:  , runs-on:  , defaults:  , permissions:  , name:  , strategy:  , if:  , timeout-minutes: 360 }
name: Qodana Configuration Upload

